<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기 - BizTalk Gemini</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 업무 말투 변환기</h1>
            <p>일상적인 말투를 격식 있는 비즈니스 언어로 바꿔보세요.</p>
        </header>

        <main>
            <section class="input-section">
                <label for="inputText">변환할 내용</label>
                <textarea id="inputText" placeholder="예: 내일까지 보고서 제출 어려울 것 같음 (입력 후 대상을 선택하세요)"></textarea>
            </section>

            <section class="target-section">
                <label>수신 대상 선택</label>
                <div class="target-buttons">
                    <button class="target-btn" data-target="boss">👤 상사/임원</button>
                    <button class="target-btn" data-target="colleague">👥 타팀 동료</button>
                    <button class="target-btn" data-target="client">🤝 고객/외부</button>
                    <button class="target-btn" data-target="team">💬 팀 내 동료</button>
                </div>
            </section>

            <div class="action-section">
                <button id="convertBtn" class="main-btn">변환하기</button>
            </div>

            <section class="output-section">
                <div class="output-header">
                    <label for="outputText">변환 결과</label>
                    <button id="copyBtn" class="secondary-btn">복사하기</button>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="outputText" readonly placeholder="변환된 결과가 여기에 표시됩니다."></textarea>
                    <div id="loader" class="loader hidden">
                        <div class="spinner"></div>
                        <p>변환 중...</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 BizTalk Gemini. Powered by Upstage Solar-Pro3</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
